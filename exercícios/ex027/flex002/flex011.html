<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>

    <style>
        .container {
            background-color: lightsalmon;
            
            display: flex;
            flex-flow: row nowrap;
        }

        .item {
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;

            flex-basis: 200px;
        }

        .item:nth-child(1) {
            flex-shrink: 0;
            flex-grow: 1;    
        }

        .item:nth-child(2){
            flex-shrink: 1;
            flex-grow: 1;    
        }

        .item:nth-child(3){
            flex-shrink: 3;
            flex-grow: 1;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
    </div>
</body>

</html>
