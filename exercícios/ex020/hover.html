<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            background-color: red;
            color: white;
            height: 30px;
            width: 200px;
            text-align: center;
            cursor: pointer;
        }

        div:hover {
            color: red;
            cursor: pointer;
        }
    </style>

</head>
<body>
    
    <h1>Exemplo de hover</h1>

    <p>
        Passe o mouse sobre o texto abaixo
    </p>

    <div>
        Passe o mouse sobre este elemento
        <p>TEXTO ESCONDIDO...</p>
    </div>
    <p>
        Fim do exemplo
    </p>

</body>
</html>
