<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>
        Tente abrir esse site em vários disposítivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.
    </p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/imagem-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/imagem-m.png" type="image/png">
        <img src="imagens/imagem-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo áudio</h1>
    <p>
        Vamos aprender a reproduzir áudio em HTML5: 
    </p>
    <audio src="midia/The Girl from Saint-Anne-des-Plaines - The Mini Vandals.mp3" controls autoplay></audio>
    <!-- Nem todos os navegadores são totais compativeis, inclsuive com MP3, por isso precisamos ter em todos os formatos.
     Geralmente são compativeis com: MP3, WAV, OGG (open source)-->

     <p>
        Outra forma de reproduzir áudios:
     </p>

     <audio preload="metadata" controls autoplay loop>
        <source src="midia/The Girl from Saint-Anne-des-Plaines - The Mini Vandals.mp3" type="audio/mpeg">
        <source src="midia/The Girl from Saint-Anne-des-Plaines - The Mini Vandals.ogg" type="audio/ogg">
        <source src="midia/The Girl from Saint-Anne-des-Plaines - The Mini Vandals.wav" type="audio/wav">
        <p>
            Infelizmente, o seu navegador não consegue reproduzir áudio.<a href="midia/The Girl from Saint-Anne-des-Plaines - The Mini Vandals.mp3">Clique aqui para baixar o arquivo MP3</a>
        </p>
     </audio>

</body>
</html>
