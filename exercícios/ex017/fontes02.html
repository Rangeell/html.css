<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamentos de Texto</title>
</head>

<style>
    body {
        font: normal 16px Arial, Verdana, sans-serif;
        text-align: left; /*Como o texto já vem alinhado à esquerda por padrão, essa propriedade não vai ter efeito*/
    }

    h1{
        text-align: center;
    }

    h2 {
        text-align: right;
    }

    p {
        text-align: justify;
        text-indent: 30px; /* Indenta o primeiro parágrafo de cada seção */
    }

</style>

<body>
    <h1>Tipos de alinhamento</h1>
    <h2>Subtítulo</h2>

    <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sint, laboriosam?
    </p>

    <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Consequuntur, corrupti.
    </p>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorem, saepe!
    </p>
</body>
</html>
