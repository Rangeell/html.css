<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>

    <style>
        h1{ /* Block-level */
            background-color: lightgrey;

            height: 300px;
            width: 300px;

            border: 10px solid darkslategray;

            padding: 10px;

            margin: 50px auto;

            outline: 10px dashed salmon;
        }

        a{ /* Inline-level */

            border: 10px solid red;

            padding: 10px;

            display: block;
        }
        
    </style>

</head>

<body>
    <h1>Exemplo de caixa Block-level</h1>
    <p>
        Parágrafos também são exemplos de Block-level, mas os <a href="#">links são exemplos de caixas Inline-level</a>.Vamos ver como tudo isso funciona.
    </p>

</body>
</html>
