<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>

<style>

    /* Body configurations */
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    /* Table configurations */
    table {
        border-collapse: collapse;
        text-align: center;
    }

    /* Caption configurations */
    caption {
        background-color: rgb(6, 185, 245);
        font-size: 1.5em;
        font-weight: bold;
        padding: 10px;
    }

    th,
    td {
        padding: 10px;
        border: 1px solid black;
    }

    th {
        background-color: rgb(49, 194, 194);
    }

    /* Efeito zebrado */
    tr:nth-child(odd) {
        background-color: lightblue;
    }

    tr:nth-child(even) {
        background-color: rgb(110, 190, 217);
    }
</style>

<body>

    <table>
        <caption>Filmes favoritos</caption>
        <thead>
            <tr>
                <th scope="col">Grupo</th>
                <th scope="col">Nomes</th>
                <th scope="colgroup" colspan="3">Filmes</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="3">Mulheres</th>
                <td>Ana Maria Santos</td>
                <td>Alien</td>
                <td>Rambo</td>
                <td>Vingadores</td>
            </tr>

            <tr>
                <td>Beatriz Souza</td>
                <td>Hulk</td>
                <td>Inception</td>
                <td>Batiman</td>
            </tr>
            <tr>
                <td>Claúdia Melo</td>
                <td>Oblivion</td>
                <td>Matrix</td>
                <td>Big Hero</td>
            </tr>
            <tr>
                <th scope="rowgroup" rowspan="3">Homens</th>
                <td>Bruno mendonça</td>
                <td>Intocáveis</td>
                <td>Amnésia</td>
                <td>Gladiador</td>
            </tr>
            <tr>
                <td>Daniel Lourenço</td>
                <td>Wall-E</td>
                <td>Oldboy</td>
                <td>Dangal</td>
            </tr>
            <tr>
                <td>Fabiano Mota</td>
                <td>Star Wars 5</td>
                <td>Taxi Driver</td>
                <td>Toy Story</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
