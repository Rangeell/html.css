<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <h1>Testando Formulários</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sex" id="isexmasc" checked value="M">
            <label for="isexmasc">Masculino</label>

            <input type="radio" name="sex" id="isexfem" value="F">
            <label for="isexfem">Feminino</label>
            
            <input type="radio" name="sex" id="isexoutro">
            <label for="isexoutro">Outro</label>
        </fieldset>

        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esbas" id="iesbas" checked value="Basquete">
            <label for="iesbas">Basquete</label> <br>
            
            <input type="checkbox" name="esfut" id="iesfut" value="Futebol">
            <label for="iesfut">Futebol</label> <br>

            <input type="checkbox" name="esnat" id="iesnat" value="Natação">
            <label for="iesnat">Natação</label> <br>

            <input type="checkbox" name="esten" id="iesten" checked value="Tênis">
            <label for="iesten">Tênis</label> <br>
        </fieldset>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>

</html>
