<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo de iframe</title>

    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 3px solid black;
        }
    </style>

</head>

<body>
    <h1>Testante o uso de inframe</h1>
    <p>
        Acessando o site do

        <!-- Tamanho padrão é de 300x150px -->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" scrolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank" rel="noreferrer">Curso em Vídeo</a>
        </iframe>

        para aprender a programar.
    </p>

    <p>
        O meu site 
        
        <iframe src="https://rangeell.github.io/curso.html.css/desafios/d012.cordel/cordel.html" frameborder="0" height="500" width="500">
            <a href="https://rangeell.github.io/curso.html.css/desafios/d012.cordel/cordel.html" target="_blank" rel="external"></a>
        </iframe>
        
        também é bem legal!
    </p>
</body>

</html>
