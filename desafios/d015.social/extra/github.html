<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
        }

        body {
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
        }

        img {
            display: block;
            margin: auto;
            width: 240px;
            height: 100%;
        }

        .link {
            width: 100%;
            background-color: red;
            height: 60px;
            position: relative;
        }

        a {
            color: white;
            text-decoration: none;
            display: inline-block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: 0.3s ease;
        }

        a:hover {
            font-size: 20px;
        }
    </style>

</head>
<body>
    <div>
        <img src="../images/tela-github.jpg" alt="Tela do antigo GitHub">
        <div class="link">
            <a href="https://github.com/Rangeell" target="_blank" rel="noreferrer">Acesse aqui</a>
        </div>
    </div>
</body>
</html>
